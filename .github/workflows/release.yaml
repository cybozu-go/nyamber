name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read
jobs:
  image:
    name: Push Container image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - run: make docker-build
      - name: Login to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to ghcr.io
        run: |
          IMAGE_TAG=${GITHUB_REF#refs/tags/v} # Remove "v" prefix.
          docker tag nyamber-controller:dev ghcr.io/cybozu-go/nyamber-controller:$IMAGE_TAG
          docker push ghcr.io/cybozu-go/nyamber-controller:$IMAGE_TAG
          docker tag localhost:5151/nyamber-runner:dev ghcr.io/cybozu-go/nyamber-runner:$IMAGE_TAG
          docker push ghcr.io/cybozu-go/nyamber-runner:$IMAGE_TAG
  release:
    name: Release on GitHub
    needs: image
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/} # Don't remove "v" prefix.
          if echo ${VERSION} | grep -q -e '-'; then PRERELEASE_FLAG=-p; fi
          gh release create $VERSION $PRERELEASE_FLAG \
            -t "Release $VERSION"  \
            -n "See [CHANGELOG.md](./CHANGELOG.md) for details."
