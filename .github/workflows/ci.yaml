name: CI
on:
  pull_request:
  push:
    branches:
    - 'main'
env:
  cache-version: 1
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - run: make docker-build
  test:
    name: Small tests
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
    - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c  # v4.0.4
      with:
        aqua_version: v2.57.1
        github_token: ${{ secrets.GITHUB_TOKEN }}
    - run: make fmt
    - run: make vet
    - run: make check-generate
    - run: make test
  e2e:
    name: End-to-End Tests
    strategy:
      matrix:
        kind-image-ref:
          - "v1.33.7@sha256:d26ef333bdb2cbe9862a0f7c3803ecc7b4303d8cea8e814b481b09949d353040" # renovate:
          - "v1.34.3@sha256:08497ee19eace7b4b5348db5c6a1591d7752b164530a36f855cb0f2bdcbadd48" # renovate:
          - "v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f" # renovate:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
    - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c  # v4.0.4
      with:
        aqua_version: v2.57.1
        github_token: ${{ secrets.GITHUB_TOKEN }}
    - name: Extract kubernetes version from kind-image-ref
      id: k8s-version
      run: |
        KIND_IMAGE_REF="${{ matrix.kind-image-ref }}"
        VERSION=$(echo "$KIND_IMAGE_REF" | awk -F '[@v]' '{print $2}')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - run: make setup
      working-directory: e2e
    - run: make start KIND_IMAGE_REF=${{ matrix.kind-image-ref }}
      working-directory: e2e
    - run: make test
      working-directory: e2e
    - run: make logs
      working-directory: e2e
      if: always()
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: logs-${{ steps.k8s-version.outputs.version }}.tar.gz
        path: e2e/logs.tar.gz
